<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengunduh Video</title>
    <style>
        /* styling sama seperti sebelumnya, tidak perlu diubah */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        h1 { text-align: center; margin-bottom: 1.5rem; color: #333; }
        input[type="text"] {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            transition: border 0.3s;
        }
        input[type="text"]:focus { border-color: #667eea; }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }
        button:hover { background: #5a67d8; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        #status {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #555;
            min-height: 20px;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ccc;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer { text-align: center; font-size: 12px; color: #888; margin-top: 20px; }
        .footer a { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⬇️ Unduh Video dari Link</h1>
        <input type="text" id="urlInput" placeholder="Tempel link video di sini..." />
        <button id="downloadBtn" onclick="startDownload()">Unduh</button>
        <div id="status"></div>
        <div class="footer">
            Mendukung YouTube, TikTok, Twitter, Instagram, dan lainnya.<br>
            Ditenagai oleh <a href="https://cobalt.tools" target="_blank">cobalt.tools</a>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const btn = document.getElementById('downloadBtn');
        const urlInput = document.getElementById('urlInput');

        async function startDownload() {
            const url = urlInput.value.trim();
            if (!url) {
                statusDiv.innerHTML = '❌ Masukkan link terlebih dahulu.';
                return;
            }
            btn.disabled = true;
            statusDiv.innerHTML = '<span class="spinner"></span> Menghubungi server...';

            try {
                const response = await fetch('/api/proxy', {  // endpoint relatif ke worker
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                if (data.url) {
                    statusDiv.innerHTML = '✅ Unduhan dimulai...';
                    const a = document.createElement('a');
                    a.href = data.url;
                    a.download = '';
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    statusDiv.innerHTML = '✅ Unduhan dimulai. Jika tidak otomatis, <a href="' + data.url + '" target="_blank">klik di sini</a>.';
                } else if (data.error) {
                    throw new Error(data.error);
                } else {
                    throw new Error('Respons tidak dikenali');
                }
            } catch (err) {
                statusDiv.innerHTML = '❌ Gagal: ' + err.message;
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startDownload();
        });
    </script>
</body>
</html>
